<body>

</div>

    <p style="color:#aaa870;">Enable notifications to get sell alerts even when this tab is in the background.</p>
    <button id="notif-btn" onclick="requestNotifs()" style="background:rgba(255,214,10,0.15);border:1px solid rgba(255,214,10,0.35);color:var(--warn);">ENABLE NOTIFICATIONS</button>

<script>
var markets=[], prev=[], alerts=[], owned=new Set();
var scanN=0, sellN=0, buyN=0, alertId=0;
var usingLive=false;

// ── Links ─────────────────────────────────────────────────────────────────────
function kWeb(t){ return "https://kalshi.com/markets/"+t.toLowerCase(); }
function kApp(t){ return "kalshi://markets/"+t.toLowerCase(); }
function openKalshi(t){
  window.location.href=kApp(t);
  setTimeout(function(){ window.open(kWeb(t),"_blank"); },1500);
}

// ── Fallback simulated data (realistic tickers matching real Kalshi format) ───
var SIMULATED = [
  { id:"INXD-23DEC31-B4800",   ticker:"INXD-23DEC31-B4800",   title:"S&P 500 above 4800 today?",          yes:62, volume:142000, expiry:45 },
  { id:"KXBTCD-23DEC31-B67000",ticker:"KXBTCD-23DEC31-B67000",title:"Bitcoin above $67K at close?",        yes:54, volume:210000, expiry:38 },
  { id:"KXETHD-23-B3500",      ticker:"KXETHD-23-B3500",      title:"ETH above $3500 today?",              yes:41, volume:98000,  expiry:52 },
  { id:"FEDRATE-23DEC-25BPS",  ticker:"FEDRATE-23DEC-25BPS",  title:"Fed cuts 25bps this meeting?",        yes:78, volume:330000, expiry:18 },
  { id:"KXNDAQ-23-UP",         ticker:"KXNDAQ-23-UP",         title:"NASDAQ up at 4PM close?",             yes:61, volume:88000,  expiry:55 },
  { id:"KXNDAQ-23-DOWN",       ticker:"KXNDAQ-23-DOWN",       title:"NASDAQ down at 4PM close?",           yes:40, volume:84000,  expiry:55 },
  { id:"KXOILD-23-B80",        ticker:"KXOILD-23-B80",        title:"Oil above $80 at close?",             yes:33, volume:45000,  expiry:44 },
  { id:"KXGOLD-23-B2000",      ticker:"KXGOLD-23-B2000",      title:"Gold above $2000 at close?",          yes:82, volume:67000,  expiry:31 },
  { id:"KXSPYD-23-B500",       ticker:"KXSPYD-23-B500",       title:"SPY closes above $500?",              yes:73, volume:156000, expiry:58 },
  { id:"UNEMP-23-B4PCT",       ticker:"UNEMP-23-B4PCT",       title:"US unemployment below 4% this month?",yes:71, volume:56000,  expiry:90 },
];

// ── API fetch with CORS proxies ────────────────────────────────────────────────
// We try multiple approaches to work around CORS restrictions on GitHub Pages
var VERCEL_API = "https://kalshi-wire.vercel.app/api/markets";

async function fetchLiveMarkets(){
  try {
    var r = await fetch(VERCEL_API, { method:"GET" });
    if(!r.ok) throw new Error("HTTP "+r.status);
    var data = await r.json();
    var raw  = data.markets || [];
    var now  = Date.now();
    var parsed = raw
      .filter(function(m){ return m.close_time && m.yes_bid!=null; })
      .map(function(m){
        var expMin = Math.max(0, Math.round((new Date(m.close_time).getTime()-now)/60000));
        var yes    = Math.round(Math.min(100,Math.max(0, m.yes_bid*100)));
        return { id:m.ticker, ticker:m.ticker, title:m.title||m.ticker, yes:yes, volume:m.volume||0, expiry:expMin };
      })
      .filter(function(m){ return m.expiry>0 && m.expiry<=120; })
      .sort(function(a,b){ return b.volume-a.volume; })
      .slice(0,40);
    if(parsed.length>0){ usingLive=true; return parsed; }
  } catch(e){ console.warn("Vercel API failed:", e.message); }
  return null;
}

async function initMarkets(){
  setStatus("loading");
  var data = await fetchLiveMarkets();

  if(data && data.length>0){
    markets = data; prev = data.map(function(m){return Object.assign({},m);});
    setStatus("live");
    document.getElementById("data-source-note").style.display="none";
  } else {
    // Fall back to simulated data with realistic movement
    markets = SIMULATED.map(function(m){return Object.assign({},m);});
    prev    = SIMULATED.map(function(m){return Object.assign({},m);});
    setStatus("sim");
    var note = document.getElementById("data-source-note");
    note.style.display="block";
    note.innerHTML="<strong>Demo mode</strong> — Kalshi API is currently unreachable from this browser (CORS restriction). Showing simulated markets with realistic price movements. Deep links still open the real Kalshi app.";
  }

  document.getElementById("load-spinner").style.display="none";
  renderMarkets();
  renderStats();
}

async function refreshMarkets(){
  var data = usingLive ? await fetchLiveMarkets() : null;

  if(data && data.length>0){
    processDelta(prev, data);
    prev=data.map(function(m){return Object.assign({},m);}); markets=data;
  } else {
    // Simulate realistic price movements
    var next = prev.map(function(m){
      return Object.assign({},m,{
        yes:    Math.max(2,Math.min(98, m.yes+(Math.random()-0.48)*(Math.random()>0.82?18:3))),
        expiry: Math.max(1, m.expiry-1),
        volume: m.volume+Math.floor(Math.random()*2000),
      });
    });
    processDelta(prev, next);
    prev=next; markets=next;
  }

  scanN++;
  setStatus(usingLive?"live":"sim");
  renderAll();
}

function processDelta(oldList, newList){
  var byId={};
  newList.forEach(function(m){byId[m.id]=m;});
  newList.forEach(function(curr){
    var p=oldList.find(function(x){return x.id===curr.id;});
    if(!p) return;
    var spike=detectSpike(p,curr);
    if(spike){
      if(spike.side==="SELL"&&!owned.has(curr.id)) return;
      var a=Object.assign({},spike,{id:"a"+(++alertId),market:curr.title,ticker:curr.ticker,expiry:curr.expiry,volume:curr.volume,ts:Date.now(),source:usingLive?"LIVE":"DEMO"});
      alerts.unshift(a); if(a.source==="LIVE") pushNotif(a);
      if(a.side==="SELL") sellN++; else buyN++;
    }
  });
  if(alerts.length>50) alerts=alerts.slice(0,50);
}

// ── Detection ──────────────────────────────────────────────────────────────────
function detectSpike(p,c){
  var d=c.yes-p.yes;
  if(Math.abs(d)<8) return null;
  var sell=d>0;
  return { type:"SPIKE", side:sell?"SELL":"BUY",
    delta:Math.abs(d).toFixed(1),
    label:sell?"YES surged +"+Math.abs(d).toFixed(1)+"% — likely to correct":"YES dropped -"+Math.abs(d).toFixed(1)+"% — dip opportunity",
    action:sell?"Exit YES before price corrects back down":"Enter YES while price is depressed",
    urgency:Math.abs(d)>=14?"CRITICAL":"HIGH" };
}

// ── Notifications ──────────────────────────────────────────────────────────────
function updateNotifBanner(){
  var b=document.getElementById("notif-banner"),btn=document.getElementById("notif-btn");
  if(!("Notification" in window)){b.style.display="none";return;}
  if(Notification.permission==="granted"){
    b.style.background="rgba(0,232,122,0.06)"; b.style.borderColor="rgba(0,232,122,0.2)";
    b.querySelector("p").style.color="var(--buy)";
    b.querySelector("p").textContent="Notifications on — you'll be pinged for every sell signal.";
    btn.style.display="none";
  } else if(Notification.permission==="denied"){
    b.querySelector("p").textContent="Notifications blocked. Go to Settings > Safari > Notifications to allow kalshi-wire.";
    btn.style.display="none";
  }
}
function requestNotifs(){
  if(!("Notification" in window)) return;
  Notification.requestPermission().then(function(){updateNotifBanner();});
}
function pushNotif(a){
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  try{ new Notification(a.side+" SIGNAL — "+a.urgency+" ["+a.source+"]",{body:a.market+"\n"+a.label,tag:a.id}); }catch(e){}
}

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(s){
  var dot=document.getElementById("status-dot"),lbl=document.getElementById("status-label");
  var cfg={
    loading: {bg:"var(--warn)",  shadow:"var(--warn)",  anim:"blink 1s ease-in-out infinite", txt:"LOADING"},
    live:    {bg:"var(--buy)",   shadow:"var(--buy)",   anim:"none",                           txt:"LIVE"},
    sim:     {bg:"#f59e0b",      shadow:"#f59e0b",      anim:"none",                           txt:"DEMO"},
  };
  var c=cfg[s]||cfg.sim;
  dot.style.background=c.bg; dot.style.boxShadow="0 0 6px "+c.shadow; dot.style.animation=c.anim;
  lbl.textContent=c.txt;
}

// ── Render ────────────────────────────────────────────────────────────────────
function ageStr(ts){ var s=Math.floor((Date.now()-ts)/1000); return s<60?s+"s ago":Math.floor(s/60)+"m ago"; }

function alertHTML(a){
  var sell=a.side==="SELL", col=sell?"var(--sell)":"var(--buy)";
  var cls="alert-card "+(sell?"sell":"buy")+(a.urgency==="CRITICAL"?" critical":"");
  var isOwned=owned.has(a.ticker);
  var boughtBtn=!sell
    ?'<button class="bought-btn '+(isOwned?"on":"off")+'" onclick="toggleOwned(\''+a.ticker+'\')">'+(isOwned?"✓ OWNED — SELL ALERTS ON":"I BOUGHT THIS — TAP TO TRACK")+'</button>'
    :"";
  return '<div class="'+cls+'">'
    +'<div class="card-top"><div class="card-badges">'
    +'<span class="badge-side" style="background:'+col+'">'+a.side+'</span>'
    +'<span class="badge-type">'+a.type+'</span>'
    +(a.urgency==="CRITICAL"?'<span class="badge-crit">CRITICAL</span>':'')
    +(sell?'<span class="badge-owned">YOU OWN THIS</span>':'')
    +(a.source==="LIVE"
      ?'<span style="font-size:9px;font-weight:700;color:#00e87a;background:rgba(0,232,122,0.1);border:1px solid rgba(0,232,122,0.25);padding:3px 7px;border-radius:5px;">LIVE</span>'
      :'<span style="font-size:9px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);padding:3px 7px;border-radius:5px;">DEMO</span>'
    )
    +'</div><div style="display:flex;align-items:center;gap:6px">'
    +'<span class="card-age" data-ts="'+a.ts+'">'+ageStr(a.ts)+'</span>'
    +'<button class="dismiss-btn" onclick="dismissAlert(\''+a.id+'\')">×</button>'
    +'</div></div>'
    +'<div class="card-title">'+a.market+'</div>'
    +'<div class="card-label" style="color:'+col+'">'+a.label+'</div>'
    +'<div class="card-action">→ '+a.action+'</div>'
    +'<div class="card-meta">'
    +'<span style="color:'+(a.expiry<20?"var(--sell)":"var(--subtext)")+'">expires '+a.expiry+'m</span>'
    +'<span>vol $'+(a.volume/1000).toFixed(0)+'K</span>'
    +'<span style="color:'+col+';font-weight:500">Δ '+a.delta+'%</span>'
    +'</div>'
    +'<div class="card-btns">'
    +'<button class="cta-btn" onclick="openKalshi(\''+a.ticker+'\')" style="background:'+col+'">'+a.side+' ON KALSHI →</button>'
    +'<a href="'+kWeb(a.ticker)+'" target="_blank" class="web-btn">WEB</a>'
    +'</div>'+boughtBtn+'</div>';
}

function emptyHTML(msg,sub){
  return '<div class="empty"><div class="empty-icon">⚡</div><div class="empty-title">'+msg+'</div><div class="empty-sub">'+(sub||"")+'</div></div>';
}

function renderAlerts(id,filter){
  var el=document.getElementById(id);
  var list=filter==="all"?alerts:alerts.filter(function(a){return a.side===filter.toUpperCase();});
  el.innerHTML=list.length===0?emptyHTML(
    filter==="sell"?"NO SELL ALERTS YET":filter==="buy"?"NO BUY ALERTS YET":"WATCHING FOR SIGNALS",
    "Scanning every 15s"
  ):list.map(alertHTML).join("");
}

function renderMarkets(){
  var el=document.getElementById("market-list");
  if(!markets.length){el.innerHTML='<div class="spinner" style="margin:20px auto"></div>';return;}
  el.innerHTML=markets.map(function(m){
    var isOwned=owned.has(m.id);
    var col=m.yes>=70?"var(--buy)":m.yes<=30?"var(--sell)":"#f59e0b";
    return '<div class="market-tile '+(isOwned?"owned":"unowned")+'">'
      +'<div onclick="openKalshi(\''+m.ticker+'\')" style="cursor:pointer">'
      +'<div class="tile-title">'+m.title+'</div>'
      +'<div class="tile-row">'
      +'<span class="tile-pct" style="color:'+col+'">'+Math.round(m.yes)+'%</span>'
      +'<span style="font-size:10px;color:'+(m.expiry<20?"var(--sell)":"var(--subtext)")+'">~'+m.expiry+'m</span>'
      +'</div>'
      +'<div class="tile-bar"><div class="tile-fill" style="width:'+m.yes+'%;background:'+col+'"></div></div>'
      +'</div>'
      +'<button class="own-btn '+(isOwned?"on":"off")+'" onclick="toggleOwned(\''+m.id+'\')">'
      +(isOwned?"✓ OWNED — SELL ALERTS ON":"I BOUGHT THIS")
      +'</button></div>';
  }).join("");
}

function renderStats(){
  document.getElementById("s-scans").textContent=scanN;
  document.getElementById("s-sell").textContent=sellN;
  document.getElementById("s-buy").textContent=buyN;
  document.getElementById("s-owned").textContent=owned.size;
  var tip=document.getElementById("tip-all");
  if(owned.size>0){tip.className="tip-box green";tip.innerHTML="Watching <strong>"+owned.size+" position"+(owned.size>1?"s":"")+"</strong> for sell signals.";}
  else{tip.className="tip-box blue";tip.innerHTML='Tap <strong>I BOUGHT THIS</strong> on any buy alert to track your position and get sell alerts.';}
}

function renderAll(){renderStats();renderAlerts("alerts-all","all");renderAlerts("alerts-sell","sell");renderAlerts("alerts-buy","buy");renderMarkets();}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggleOwned(id){owned.has(id)?owned.delete(id):owned.add(id);renderAll();}
function dismissAlert(id){alerts=alerts.filter(function(a){return a.id!==id;});renderAll();}
function showTab(tab){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(t){t.className="tab";});
  document.getElementById("page-"+tab).classList.add("active");
  var idx=["all","sell","buy","positions"].indexOf(tab);
  document.querySelectorAll(".tab")[idx].className="tab "+["a-all","a-sell","a-buy","a-pos"][idx];
}

setInterval(function(){
  document.querySelectorAll("[data-ts]").forEach(function(el){el.textContent=ageStr(parseInt(el.getAttribute("data-ts")));});
},1000);

updateNotifBanner();
initMarkets();
setInterval(refreshMarkets,15000);
</script>

</body>
</html>
